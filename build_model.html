            var model_instance = "wg_mike11";

                //显示已有模拟方案和模型闸站调度、污染源信息
                show_models(_data);
            })

            //显示已有模拟方案
            function show_models(_data) {
                $('#select_ele').empty();
                for (var plan_code in _data) {
                    var model_info = _data[plan_code];
                    var info = '';
                    for (var item in model_info) {
                        info += item + ': ' + model_info[item] + '&nbsp';
                    }

                    $('#select_ele').append($('<option >' + plan_code + '$' + '&nbsp;&nbsp' + info + '</option>'));
                }

                //设置当前选择的模型为最后一个模型
                $("#select_ele option:last").prop("selected", 'selected');

                //设置本地存储
                //window.localStorage.setItem('selected_model', $('#select_ele').val().split('$')[0]); //非服务器部署后不支持
                if ($('#select_ele').val() != "") {
                    $.cookie('selected_model', $('#select_ele').val().split('$')[0]);
                }

                //触发一次
                $('#select_ele').change();
            }

            //获取选中模型的闸门调度信息

                //设置本地存储
                //window.localStorage.setItem('selected_model', $('#select_ele').val().split('$')[0]);
                $.cookie('selected_model', $('#select_ele').val().split('$')[0]);

                //清空闸站调度和污染源拟定信息
                $('#jzz').empty();

                //获取方案名
                var plan_code = $.cookie('selected_model');

                //判断是否加载进度条
                $('#jqmeter-container').empty();
                var model_state = $('#select_ele').val() != null ? $('#select_ele').val().split(' ')[$('#select_ele').val().split(' ').length - 2].substring(0, 3) : null;
                if (model_state == '计算中') {
                    var progress_info = $('#select_ele').val().split(' ')[$('#select_ele').val().split(' ').length - 1];
                    var total_second = parseInt(progress_info.split('$')[0]);
                    var remain_second = parseInt(progress_info.split('$')[1]);
                    show_progressbar(total_second, remain_second);
                }

                //从后台获取该方案的调度信息(由于默认采用使用缓存，修改调度后由刷新问题)
                $.getJSON('Model_Ser.ashx', { 'request_type': 'get_ddinfo', 'request_pars': plan_code }, function (dd_data) {
                    if (dd_data == null) return;

                    // 添加表格框架
                    var table = $("<table></table>");

                    // 添加表头
                    var headRow = $("<tr></tr>");
                    headRow.append("<th>ID</th><th>序号</th><th>名称</th><th>类型</th><th>河流</th><th>调度方式</th>");
                    table.append(headRow);

                    // 添加表格数据
                    var data = JSON.parse(dd_data);
                    $.each(data, function (i, item) {
                        var row = $("<tr></tr>");
                        $.each(item, function (j, val) {
                            row.append("<td>" + val + "</td>");
                        });
                        table.append(row);
                    });

                    // 将表格添加到div容器中
                    $("#jzz").append(table);
                })

            //加载进度条

                var current_value = ((total_second - remain_second) * 100 / total_second).toString();

                $('#jqmeter-container').jQMeter({

                    raised: '100',
